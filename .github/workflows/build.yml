name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: 0.0.0-alpha.1
  CGO_ENABLED: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          name="codexclaw_${VERSION}_${GOOS}_${GOARCH}"
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${name}${ext}" \
            ./cmd/codexclaw
          (cd dist && sha256sum "${name}${ext}" > "${name}.sha256")

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          name="codexclaw_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p artifacts
          if [ "${ARCHIVE}" = "zip" ]; then
            (cd dist && zip -q "../artifacts/${name}.zip" "${name}.exe" "${name}.sha256")
          else
            (cd dist && tar -czf "../artifacts/${name}.tar.gz" "${name}" "${name}.sha256")
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexclaw_${{ env.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: artifacts/*
          if-no-files-found: error
