[tools]
go = "1.25.10"
uv = "latest"

[tasks.test]
description = "Run the Go test suite without CGO"
run = "env CGO_ENABLED=0 go test ./..."

[tasks.build]
description = "Build CodexClaw without CGO"
run = "env CGO_ENABLED=0 go build ./..."

[tasks."skills:add"]
description = "Install a skills.sh package globally for Codex"
run = "scripts/skills.sh add"

[tasks."skills:list"]
description = "List installed skills through skills.sh"
run = "scripts/skills.sh list"

[tasks."skills:find"]
description = "Find skills through skills.sh"
run = "scripts/skills.sh find"

[tasks."skills:update"]
description = "Update installed skills through skills.sh"
run = "scripts/skills.sh update"

[tasks."browser:install"]
description = "Install browser binaries for agent-browser"
run = "scripts/agent-browser.sh install"

[tasks."browser:doctor"]
description = "Diagnose the agent-browser installation"
run = "scripts/agent-browser.sh doctor"

[tasks."browser:upgrade"]
description = "Upgrade agent-browser through its detected install method"
run = "scripts/agent-browser.sh upgrade"

[tasks."browser:skill"]
description = "Install the upstream agent-browser skill globally for Codex"
run = "scripts/agent-browser.sh skill"

[tasks."browser:core"]
description = "Print the version-matched agent-browser core skill"
run = "scripts/agent-browser.sh core"

[tasks."speech:install"]
description = "Prime uv-managed Edge TTS and faster-whisper dependencies"
run = "uv run --with edge-tts edge-tts --help >/dev/null && uv run --with faster-whisper python -c 'import faster_whisper; print(\"faster-whisper ready\")'"

[tasks."speech:stt"]
description = "Transcribe an audio file with faster-whisper"
run = "scripts/stt-faster-whisper.py"

[tasks."speech:tts"]
description = "Synthesize speech with Edge TTS: mise run speech:tts -- 'text' /tmp/reply.mp3"
run = "scripts/tts-edge-tts.sh"

[tasks."skill:new"]
description = "Create a local Codex skill skeleton"
run = "scripts/create-skill.sh"

[tasks."plugin:new"]
description = "Create a local Codex plugin skeleton"
run = "scripts/create-plugin.sh"
